const input = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const results = document.getElementById('results');
const stats = document.getElementById('stats');

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.substring(0, idx) + '<mark>' + text.substring(idx, idx + query.length) + '</mark>' + text.substring(idx + query.length);
}

function render(list, query) {
  if (list.length === 0) {
    results.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="8" x2="14" y2="14" stroke-dasharray="3 3"/></svg><p>没有找到匹配的单位</p></div>';
    stats.textContent = '未找到匹配结果';
    return;
  }
  stats.textContent = query ? '找到 ' + list.length + ' 个匹配结果' : '共 ' + list.length + ' 家参会单位';
  results.innerHTML = list.map(item => `
    <div class="card">
      <div class="booth-badge">
        <span class="num">${item.booth}</span>
        <span class="label">展位号</span>
      </div>
      <div class="card-info">
        <div class="card-name">${highlight(item.name, query)}</div>
      </div>
    </div>
  `).join('');
}

function search() {
  const q = input.value.trim();
  clearBtn.className = q ? 'clear-btn show' : 'clear-btn';
  if (!q) {
    render(DATA, '');
    return;
  }
  const filtered = DATA.filter(item => item.name.toLowerCase().includes(q.toLowerCase()) || String(item.booth).includes(q));
  render(filtered, q);
}

function clearSearch() {
  input.value = '';
  clearBtn.className = 'clear-btn';
  render(DATA, '');
  input.focus();
}

input.addEventListener('input', search);

// Initial render
render(DATA, '');
</script>
